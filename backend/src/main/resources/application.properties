# Database connection settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cloud_document_hub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server port
server.port=8080

# Multipart upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# AWS S3 Settings
aws.s3.enabled=${AWS_S3_ENABLED:false}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.region=${AWS_REGION:ap-southeast-1}

# Local storage fallback for development
storage.local.upload-dir=${LOCAL_UPLOAD_DIR:uploads}

